services:
  - type: web
    name: summerise-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false        # you set this manually in Render dashboard
      - key: HF_TOKEN
        sync: false        # you set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false        # set this to your Vercel URL after deploying frontend
